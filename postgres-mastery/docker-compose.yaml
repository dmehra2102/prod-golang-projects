services:
  postgres:
    image: postgres:16-alpine
    container_name: pg_mastery
    environment:
      POSTGRES_USER: pgmaster
      POSTGRES_PASSWORD: pgmaster123
      POSTGRES_DB: pgmastery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD_SHELL", "pg_isready -U pgmaster -d pgmastery"]
      interval: 5s
      timeout: 5s
      retries: 10

  # pgAdmin for visual exploration (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pg_mastery_admin
    environment:
      PGADMIN_DEFAULT_EMAIL: golangdeveloper07@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
