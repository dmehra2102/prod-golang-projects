version: "2"

run:
  timeout: 5m
  tests: true

linters:
  # In v2, 'default: none' replaces 'disable-all: true'
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - dupl
    - errname
    - exhaustive
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gofmt
    - goimports
    - mnd # 'gomnd' was renamed to 'mnd'
    - goprintffuncname
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - whitespace

  # 'linters-settings' is now just 'settings' inside the 'linters' block
  settings:
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 3
      min-occurrences: 3
    dupl:
      threshold: 150
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    errcheck:
      check-type-assertions: true
      check-blank: true
    revive:
      rules:
        - name: unexported-return
          disabled: true

  # Path exclusions are now grouped under 'linters.exclusions'
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - mnd
          - goconst
      - path: cmd/
        linters:
          - mnd

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
