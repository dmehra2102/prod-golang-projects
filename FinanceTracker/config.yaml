service:
  name: finpulse
  environment: development
  log_level: debug
  log_pretty: true

http:
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 30s
  rate_limit_rps: 100
  rate_limit_burst: 200
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

grpc:
  port: 9090
  max_recv_msg_size: 4194304
  max_send_msg_size: 4194304
  keepalive_time: 30s
  keepalive_timeout: 10s

postgres:
  host: localhost
  port: 5432
  user: finpulse
  password: finpulse_dev_password
  database: finpulse
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m
  conn_max_idle_time: 1m

redis:
  addresses:
    - "localhost:6379"
  password: finpulse_redis_dev
  db: 0
  pool_size: 20
  min_idle_conns: 5
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  cluster_mode: false

kafka:
  brokers:
    - "localhost:9092"
  group_id: finpulse-dev
  auto_offset_reset: earliest
  enable_idempotent: true
  acks: all
  retries: 5

jwt:
  secret_key: "sdksmdfkm34imsddkfm3333ddfkmkkwmekwd3e3"
  access_expiration: 15m
  refresh_expiration: 168h
  issuer: finpulse

observability:
  otlp_endpoint: "localhost:4317"
  metrics_enabled: true
  tracing_enabled: true
  sample_rate: 1.0

aws:
  region: ap-south-1
  s3_bucket: finpulse-dev-assets
  ses_from_email: noreply@finpulse.dev
  sns_topic_arn: ""
  kms_key_id: ""
  secrets_prefix: finpulse/dev
